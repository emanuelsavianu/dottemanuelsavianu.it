// Giorni festivi nazionali italiani (fissi + Pasquetta calcolata)
const HOLIDAYS_BY_YEAR = {};
function getItalianHolidays(year) {
    if (HOLIDAYS_BY_YEAR[year]) return HOLIDAYS_BY_YEAR[year];

    // Calcolo Pasqua con algoritmo di Gauss/Computus
    const a = year % 19;
    const b = Math.floor(year / 100);
    const c = year % 100;
    const d = Math.floor(b / 4);
    const e = b % 4;
    const f = Math.floor((b + 8) / 25);
    const g = Math.floor((b - f + 1) / 3);
    const h = (19 * a + b - d - g + 15) % 30;
    const i = Math.floor(c / 4);
    const k = c % 4;
    const l = (32 + 2 * e + 2 * i - h - k) % 7;
    const m = Math.floor((a + 11 * h + 22 * l) / 451);
    const month = Math.floor((h + l - 7 * m + 114) / 31);
    const day = ((h + l - 7 * m + 114) % 31) + 1;
    const easter = new Date(year, month - 1, day);
    const easterMonday = new Date(easter);
    easterMonday.setDate(easter.getDate() + 1);

    const holidays = [
        `${year}-01-01`, // Capodanno
        `${year}-01-06`, // Epifania
        `${year}-04-25`, // Liberazione
        `${year}-05-01`, // Festa dei Lavoratori
        `${year}-06-02`, // Repubblica
        `${year}-08-15`, // Ferragosto
        `${year}-11-01`, // Ognissanti
        `${year}-12-08`, // Immacolata
        `${year}-12-25`, // Natale
        `${year}-12-26`, // Santo Stefano
        formatDate(easter),
        formatDate(easterMonday),
    ];
    HOLIDAYS_BY_YEAR[year] = new Set(holidays);
    return HOLIDAYS_BY_YEAR[year];
}

function formatDate(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${dd}`;
}

function parseDate(str) {
    const [y, m, d] = str.split('-').map(Number);
    return new Date(y, m - 1, d);
}

function formatDateIT(str) {
    const d = parseDate(str);
    return d.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

// Conta giorni lavorativi tra due date (esclusi weekend e festivi)
function countWorkingDays(startStr, endStr, excludeHolidays = true) {
    const start = parseDate(startStr);
    const end = parseDate(endStr);
    let count = 0;
    const current = new Date(start);
    while (current <= end) {
        const day = current.getDay();
        const dateStr = formatDate(current);
        const year = current.getFullYear();
        const isWeekend = day === 0 || day === 6;
        const isHoliday = excludeHolidays && getItalianHolidays(year).has(dateStr);
        if (!isWeekend && !isHoliday) count++;
        current.setDate(current.getDate() + 1);
    }
    return count;
}

// Genera tutti i giorni lavorativi in un periodo
function getWorkingDaysInRange(startStr, endStr) {
    const start = parseDate(startStr);
    const end = parseDate(endStr);
    const days = [];
    const current = new Date(start);
    while (current <= end) {
        const day = current.getDay();
        const dateStr = formatDate(current);
        const year = current.getFullYear();
        const isWeekend = day === 0 || day === 6;
        const isHoliday = getItalianHolidays(year).has(dateStr);
        if (!isWeekend && !isHoliday) days.push(dateStr);
        current.setDate(current.getDate() + 1);
    }
    return days;
}

// HOOK: PERSISTENZA localStorage
// ============================================================
function useLocalStorage(key, defaultValue) {
    const [value, setValue] = React.useState(() => {
        try {
            const saved = localStorage.getItem(key);
            return saved ? JSON.parse(saved) : defaultValue;
        } catch { return defaultValue; }
    });

    React.useEffect(() => {
        try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
    }, [key, value]);

    return [value, setValue];
}

function SetupPanel({ doctors, setDoctors, coverageLimit, setCoverageLimit, defaultYearlyDays, setDefaultYearlyDays, onComplete }) {

    const [newDays, setNewDays] = React.useState(defaultYearlyDays);
    const [showAdvanced, setShowAdvanced] = React.useState(false);

    const addDoctor = () => {
        const name = newName.trim();
        if (!name) return;
        const colorIdx = doctors.length % DOCTOR_COLORS.length;
        setDoctors([...doctors, {
            id: uid(),
            name,
            totalDays: Number(newDays) || defaultYearlyDays,
            colorIdx
        }]);
        setNewName('');
        setNewDays(defaultYearlyDays);
    };

    const removeDoctor = (id) => setDoctors(doctors.filter(d => d.id !== id));

    const updateDoctor = (id, field, value) => {
        setDoctors(doctors.map(d => d.id === id ? { ...d, [field]: field === 'totalDays' ? (Number(value) || 0) : value } : d));
    };

    return (
        <div className="fade-in space-y-6">
            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div className="px-6 py-5 border-b border-slate-100 bg-gradient-to-r from-brand-600 to-brand-700">

                            Giorni di ferie annui (default)

                        <p className="text-sm text-brand-600 mb-3">Ogni nuovo medico aggiunto riceverà questo numero di giorni spettanti.</p>
                        <div className="flex items-center gap-3">

                                type="number" min="1" max="365"
                                value={defaultYearlyDays}

                                    setDefaultYearlyDays(v);
                                    setNewDays(v);
                                }}
                                className="w-28 px-4 py-2.5 border-2 border-brand-400 rounded-lg focus:ring-2 focus:ring-brand-500 outline-none text-center font-bold text-brand-800 text-lg bg-white"
                            />

                        </div>
                    </div>

                    {/* Impostazioni Avanzate (collassabile) */}
                    <div>
                        <button
                            type="button"
                            onClick={() => setShowAdvanced(v => !v)}
                            className="flex items-center gap-2 text-sm font-semibold text-slate-500 hover:text-slate-700 transition-colors"
                        >
                            <Icons.Settings size={15} />
                            Impostazioni avanzate
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{transform: showAdvanced ? 'rotate(180deg)' : 'rotate(0deg)', transition:'transform 0.2s'}}><polyline points="6 9 12 15 18 9"/></svg>
                        </button>
                        {showAdvanced && (
                            <div className="mt-3 p-4 bg-slate-50 rounded-xl border border-slate-200">
                                <label className="block text-sm font-semibold text-slate-700 mb-2">
                                    Limite copertura: max medici in ferie contemporaneamente
                                </label>
                                <input
                                    type="number" min="1" max="20"

                                    className="w-32 px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none text-center font-medium"
                                />

                            </div>
                        )}
                    </div>

                    {/* Lista medici esistenti */}
                    {doctors.length > 0 && (
                        <div>
                            <h3 className="text-sm font-semibold text-slate-700 mb-3">Medici nel gruppo ({doctors.length})</h3>
                            <div className="space-y-2">
                                {doctors.map((doc, idx) => {
                                    const c = DOCTOR_COLORS[doc.colorIdx % DOCTOR_COLORS.length];
                                    return (
                                        <div key={doc.id} className={`flex items-center gap-3 px-4 py-3 rounded-lg border ${c.border} ${c.bg}`}>

                                            </span>
                                            <div className="flex items-center gap-2">
                                                <input
                                                    type="number" min="0" max="365"

                                                    className="w-20 px-2 py-1 border border-slate-300 rounded text-sm text-center bg-white"
                                                />

                            />

                                <Icons.Plus size={16} /> Aggiungi

// ============================================================
// COMPONENTE: Dashboard con calcoli e alert
// ============================================================
function Dashboard({ doctors, holidays, coverageLimit }) {

    // --- Calcolo riepilogo per medico ---
    const doctorSummary = React.useMemo(() => {
        return doctors.map(doc => {
            const docHolidays = holidays.filter(h => h.doctorId === doc.id);
            const totalUsed = docHolidays.reduce((sum, h) => sum + countWorkingDays(h.start, h.end), 0);
            return {
                ...doc,
                holidays: docHolidays,
                used: totalUsed,
                remaining: doc.totalDays - totalUsed
            };
        });
    }, [doctors, holidays]);

    // --- Calcolo alert copertura ---
    const coverageAlerts = React.useMemo(() => {
        if (holidays.length === 0) return [];

        // Raccogli tutti i giorni lavorativi in cui qualcuno è in ferie
        const dayMap = {}; // dateStr -> [doctorIds]
        holidays.forEach(h => {
            const days = getWorkingDaysInRange(h.start, h.end);
            days.forEach(d => {
                if (!dayMap[d]) dayMap[d] = [];
                if (!dayMap[d].includes(h.doctorId)) dayMap[d].push(h.doctorId);
            });
        });

        // Trova giorni che superano il limite
        const alerts = [];
        Object.entries(dayMap)
            .filter(([_, ids]) => ids.length > coverageLimit)
            .sort(([a], [b]) => a.localeCompare(b))
            .forEach(([date, ids]) => {
                alerts.push({
                    date,
                    count: ids.length,
                    doctors: ids.map(id => doctors.find(d => d.id === id)?.name || '?')
                });
            });

        // Raggruppa alert consecutivi
        const grouped = [];
        alerts.forEach(a => {
            const last = grouped[grouped.length - 1];
            if (last && last.count === a.count && last.doctors.join(',') === a.doctors.join(',')) {
                const prevDate = parseDate(last.endDate || last.startDate);
                const currDate = parseDate(a.date);
                const diff = (currDate - prevDate) / (1000 * 60 * 60 * 24);
                // Considera consecutivi se differenza <= 3 (salta weekend)
                if (diff <= 3) {
                    last.endDate = a.date;
                    return;
                }
            }
            grouped.push({ startDate: a.date, endDate: a.date, count: a.count, doctors: a.doctors });
        });

        return grouped;
    }, [holidays, doctors, coverageLimit]);

    const getDoctorColor = (doc) => DOCTOR_COLORS[doc.colorIdx % DOCTOR_COLORS.length];

    return (
        <div className="fade-in space-y-6">
            {/* Alert Scopertura */}
            {coverageAlerts.length > 0 && (
                <div className="bg-red-50 border-2 border-red-200 rounded-2xl p-5">
                    <div className="flex items-center gap-3 mb-3">
                        <div className="bg-red-100 p-2 rounded-lg">
                            <Icons.AlertTriangle size={22} className="text-red-600" />
                        </div>
                        <h3 className="font-bold text-red-800 text-lg">Attenzione: Scoperture rilevate!</h3>
                    </div>
                    <p className="text-sm text-red-700 mb-4">
                        Nei seguenti periodi il numero di medici assenti supera il limite consentito di <strong>{coverageLimit}</strong>.
                    </p>
                    <div className="space-y-2">
                        {coverageAlerts.map((alert, idx) => (
                            <div key={idx} className="bg-white border border-red-200 rounded-lg px-4 py-3 flex flex-col sm:flex-row sm:items-center gap-2">
                                <span className="font-mono font-semibold text-red-700 text-sm whitespace-nowrap">
                                    {formatDateIT(alert.startDate)}{alert.endDate !== alert.startDate ? ` — ${formatDateIT(alert.endDate)}` : ''}
                                </span>
                                <span className="bg-red-100 text-red-800 px-2 py-0.5 rounded text-xs font-bold whitespace-nowrap">
                                    {alert.count} assenti (limite: {coverageLimit})
                                </span>
                                <span className="text-sm text-slate-600 flex-1">
                                    {alert.doctors.join(', ')}
                                </span>
                            </div>
                        ))}
                    </div>
                </div>
            )}

            {coverageAlerts.length === 0 && holidays.length > 0 && (
                <div className="bg-green-50 border border-green-200 rounded-2xl p-5 flex items-center gap-3">
                    <div className="bg-green-100 p-2 rounded-lg">
                        <Icons.Check size={22} className="text-green-600" />
                    </div>
                    <div>
                        <h3 className="font-bold text-green-800">Copertura OK</h3>
                        <p className="text-sm text-green-700">Nessuna scopertura rilevata. Il limite di {coverageLimit} medici assenti non viene mai superato.</p>
                    </div>
                </div>
            )}

            {/* Tabella Riepilogativa */}
            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div className="px-6 py-5 border-b border-slate-100 bg-gradient-to-r from-slate-700 to-slate-800">
                    <div className="flex items-center gap-3">
                        <div className="bg-white/20 p-2 rounded-lg">
                            <Icons.BarChart size={22} className="text-white" />
                        </div>
                        <div>
                            <h2 className="text-lg font-bold text-white">Riepilogo Ferie per Medico</h2>
                            <p className="text-slate-300 text-sm">Giorni lavorativi (esclusi weekend e festivi)</p>
                        </div>
                    </div>
                </div>
                <div className="overflow-x-auto">
                    <table className="w-full text-left">
                        <thead>
                            <tr className="bg-slate-50 text-slate-500 text-xs uppercase tracking-wider">
                                <th className="px-6 py-3 font-semibold border-b border-slate-200">Medico</th>
                                <th className="px-6 py-3 font-semibold border-b border-slate-200 text-center">Spettanti</th>
                                <th className="px-6 py-3 font-semibold border-b border-slate-200 text-center">Godute</th>
                                <th className="px-6 py-3 font-semibold border-b border-slate-200 text-center">Residue</th>
                                <th className="px-6 py-3 font-semibold border-b border-slate-200 text-center">Progresso</th>
                            </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-100">
                            {doctorSummary.map(doc => {
                                const c = getDoctorColor(doc);
                                const pct = doc.totalDays > 0 ? Math.min(100, Math.round((doc.used / doc.totalDays) * 100)) : 0;
                                const isOver = doc.remaining < 0;
                                return (
                                    <tr key={doc.id} className="hover:bg-slate-50 transition-colors">
                                        <td className="px-6 py-4">
                                            <span className={`px-3 py-1.5 rounded-full text-xs font-semibold ${c.bg} ${c.text} border ${c.border}`}>
                                                {doc.name}
                                            </span>
                                        </td>
                                        <td className="px-6 py-4 text-center font-semibold text-slate-700">{doc.totalDays}</td>
                                        <td className="px-6 py-4 text-center font-semibold text-slate-700">{doc.used}</td>
                                        <td className="px-6 py-4 text-center">
                                            <span className={`font-bold ${isOver ? 'text-red-600' : 'text-green-600'}`}>
                                                {doc.remaining}
                                            </span>
                                        </td>
                                        <td className="px-6 py-4">
                                            <div className="flex items-center gap-3">
                                                <div className="flex-1 bg-slate-100 rounded-full h-2.5 overflow-hidden">
                                                    <div
                                                        className={`h-full rounded-full transition-all ${isOver ? 'bg-red-500' : pct > 80 ? 'bg-amber-500' : 'bg-brand-500'}`}
                                                        style={{ width: `${Math.min(100, pct)}%` }}
                                                    />
                                                </div>
                                                <span className="text-xs font-medium text-slate-500 w-10 text-right">{pct}%</span>
                                            </div>
                                        </td>
                                    </tr>
                                );
                            })}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    );
}

// FUNZIONE: Esportazione Excel (SheetJS)
// ============================================================
function exportToExcel(doctors, holidays, coverageLimit) {
    const wb = XLSX.utils.book_new();

    // --- Foglio 1: Riepilogo per medico ---
    const summaryData = doctors.map(doc => {
        const docH = holidays.filter(h => h.doctorId === doc.id);
        const used = docH.reduce((sum, h) => sum + countWorkingDays(h.start, h.end), 0);
        return {
            'Medico': doc.name,
            'Ferie Spettanti': doc.totalDays,
            'Ferie Godute': used,
            'Ferie Residue': doc.totalDays - used,
            'N. Periodi': docH.length
        };
    });
    const ws1 = XLSX.utils.json_to_sheet(summaryData);
    ws1['!cols'] = [{ wch: 25 }, { wch: 16 }, { wch: 14 }, { wch: 14 }, { wch: 12 }];
    XLSX.utils.book_append_sheet(wb, ws1, 'Riepilogo');

    // --- Foglio 2: Elenco cronologico ferie ---
    const sortedH = [...holidays].sort((a, b) => a.start.localeCompare(b.start));
    const listData = sortedH.map(h => {
        const doc = doctors.find(d => d.id === h.doctorId);
        return {
            'Medico': doc?.name || 'Sconosciuto',
            'Data Inizio': formatDateIT(h.start),
            'Data Fine': formatDateIT(h.end),
            'Giorni Lavorativi': countWorkingDays(h.start, h.end),
        };
    });
    const ws2 = XLSX.utils.json_to_sheet(listData);
    ws2['!cols'] = [{ wch: 25 }, { wch: 14 }, { wch: 14 }, { wch: 18 }];
    XLSX.utils.book_append_sheet(wb, ws2, 'Elenco Ferie');

    // --- Foglio 3: Alert scoperture ---
    const dayMap = {};
    holidays.forEach(h => {
        getWorkingDaysInRange(h.start, h.end).forEach(d => {
            if (!dayMap[d]) dayMap[d] = [];
            if (!dayMap[d].includes(h.doctorId)) dayMap[d].push(h.doctorId);
        });
    });
    const alertData = Object.entries(dayMap)
        .filter(([_, ids]) => ids.length > coverageLimit)
        .sort(([a], [b]) => a.localeCompare(b))
        .map(([date, ids]) => ({
            'Data': formatDateIT(date),
            'Medici Assenti': ids.length,
            'Limite': coverageLimit,
            'Nomi': ids.map(id => doctors.find(d => d.id === id)?.name || '?').join(', ')
        }));
    const ws3 = XLSX.utils.json_to_sheet(alertData.length > 0 ? alertData : [{ 'Esito': 'Nessuna scopertura rilevata' }]);
    ws3['!cols'] = [{ wch: 14 }, { wch: 16 }, { wch: 8 }, { wch: 40 }];
    XLSX.utils.book_append_sheet(wb, ws3, 'Scoperture');

    XLSX.writeFile(wb, 'Ferie_Medicina_di_Gruppo.xlsx');
}
