<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Gestione Turni RUAP — ASL</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50:'#eff6ff', 100:'#dbeafe', 500:'#3b82f6', 600:'#2563eb', 700:'#1d4ed8', 800:'#1e40af', 900:'#1e3a8a' }
          }
        }
      }
    }
  </script>
  <style>
    .thin-scroll::-webkit-scrollbar { width: 4px; }
    .thin-scroll::-webkit-scrollbar-track { background: #f1f5f9; }
    .thin-scroll::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 2px; }
    .slot-btn { transition: all 0.15s ease; }
    .slot-btn:hover { transform: scale(1.02); }
    #assign-dropdown { z-index: 9999; }
    /* Loading spinner animation */
    @keyframes spin { 100% { transform: rotate(360deg); } }
    .animate-spin-slow { animation: spin 2s linear infinite; }
  </style>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen font-sans">

<header class="bg-brand-800 text-white shadow-lg sticky top-0 z-50">
  <div class="max-w-screen-xl mx-auto px-4 py-3 flex items-center justify-between flex-wrap gap-2">
    <div class="flex items-center gap-3">
      <i class="fa-solid fa-calendar-check text-blue-300 text-xl"></i>
      <div>
        <h1 class="font-bold text-lg leading-tight">Gestione Turni RUAP</h1>
        <p class="text-blue-200 text-xs">Attività Oraria Avanzata — ACN 2024</p>
      </div>
    </div>
    <div class="flex gap-2">
      <button id="btn-gemini-assign"
        class="bg-purple-600 hover:bg-purple-500 text-white px-3 py-1.5 rounded-lg text-sm font-medium flex items-center gap-1.5 shadow-sm transition-transform hover:scale-105">
        <i class="fa-solid fa-sparkles"></i> AI Gemini Assegna
      </button>

      <button id="btn-add-doctor"
        class="bg-green-500 hover:bg-green-400 text-white px-3 py-1.5 rounded-lg text-sm font-medium flex items-center gap-1.5">
        <i class="fa-solid fa-user-plus"></i> Aggiungi Medico
      </button>
      
      <button id="btn-export"
        class="bg-blue-500 hover:bg-blue-400 text-white px-3 py-1.5 rounded-lg text-sm font-medium flex items-center gap-1.5">
        <i class="fa-solid fa-file-export"></i> Export JSON
      </button>
      
      <label class="bg-slate-500 hover:bg-slate-400 text-white px-3 py-1.5 rounded-lg text-sm font-medium flex items-center gap-1.5 cursor-pointer">
        <i class="fa-solid fa-file-import"></i> Import JSON
        <input type="file" id="import-file" accept=".json" class="hidden" />
      </label>
    </div>
  </div>
</header>

<div class="max-w-screen-xl mx-auto px-4 py-4 flex gap-4 items-start">
  <aside class="w-72 flex-shrink-0 bg-white rounded-xl shadow p-4 sticky top-20 thin-scroll" style="max-height: calc(100vh - 6rem); overflow-y: auto;">
    <h2 class="font-bold text-brand-800 text-sm uppercase tracking-wide mb-3 flex items-center gap-2">
      <i class="fa-solid fa-users text-brand-500"></i> Stato Settimanale
    </h2>
    <div class="flex items-center justify-between mb-4 bg-slate-50 rounded-lg p-2">
      <button id="sidebar-week-prev" class="text-brand-700 hover:text-brand-500 px-1"><i class="fa-solid fa-chevron-left"></i></button>
      <span id="sidebar-week-label" class="text-xs font-semibold text-slate-600 text-center"></span>
      <button id="sidebar-week-next" class="text-brand-700 hover:text-brand-500 px-1"><i class="fa-solid fa-chevron-right"></i></button>
    </div>
    <div id="sidebar-doctors" class="space-y-3"></div>
  </aside>

  <main class="flex-1 min-w-0">
    <div class="bg-white rounded-xl shadow mb-4 px-4 py-3 flex items-center justify-between">
      <button id="cal-prev" class="text-brand-700 hover:text-brand-500 font-bold px-2 py-1 rounded hover:bg-slate-100">
        <i class="fa-solid fa-chevron-left"></i>
      </button>
      <h2 id="cal-title" class="font-bold text-brand-800 text-lg tracking-wide"></h2>
      <button id="cal-next" class="text-brand-700 hover:text-brand-500 font-bold px-2 py-1 rounded hover:bg-slate-100">
        <i class="fa-solid fa-chevron-right"></i>
      </button>
    </div>

    <div class="grid grid-cols-5 gap-2 mb-2 px-1">
      <div class="text-center text-xs font-bold text-slate-500 uppercase">Lun</div>
      <div class="text-center text-xs font-bold text-slate-500 uppercase">Mar</div>
      <div class="text-center text-xs font-bold text-slate-500 uppercase">Mer</div>
      <div class="text-center text-xs font-bold text-slate-500 uppercase">Gio</div>
      <div class="text-center text-xs font-bold text-slate-500 uppercase">Ven</div>
    </div>
    <div id="cal-grid" class="space-y-2"></div>
  </main>
</div>

<div id="assign-dropdown" class="hidden fixed bg-white rounded-xl shadow-2xl border border-slate-200 p-3 w-64">
  <div class="flex items-center justify-between mb-2">
    <span id="assign-slot-label" class="text-xs font-bold text-brand-800"></span>
    <button id="assign-close" class="text-slate-400 hover:text-slate-600 text-lg leading-none">&times;</button>
  </div>
  <div id="assign-list" class="space-y-1 max-h-52 overflow-y-auto thin-scroll"></div>
  <div id="assign-remove-wrap" class="hidden mt-2 pt-2 border-t border-slate-100">
    <button id="assign-remove" class="w-full text-left text-xs text-red-500 hover:bg-red-50 rounded px-2 py-1 flex items-center gap-1.5">
      <i class="fa-solid fa-trash-can"></i> Rimuovi assegnazione
    </button>
  </div>
</div>

<div id="doctor-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-start justify-center pt-8 px-4 pb-8 overflow-y-auto">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl">
    <div class="bg-brand-800 text-white px-6 py-4 rounded-t-2xl flex items-center justify-between">
      <h3 id="modal-title" class="font-bold text-lg flex items-center gap-2">
        <i class="fa-solid fa-user-doctor"></i> Aggiungi Medico
      </h3>
      <button id="modal-close" class="text-white/70 hover:text-white text-2xl leading-none">&times;</button>
    </div>
    <div class="p-6 space-y-5">
      <input type="hidden" id="modal-doctor-id" />
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">Nome Medico *</label>
          <input type="text" id="modal-name" placeholder="Es. Dott. Rossi" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500" />
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">N° Pazienti</label>
          <input type="number" id="modal-patients" placeholder="Es. 1500" min="0" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500" />
        </div>
      </div>
      <div>
        <div class="flex items-center justify-between mb-1">
          <label class="block text-sm font-semibold text-slate-700">Debito Orario Settimanale (ore) *</label>
          <span id="debt-formula-badge" class="text-xs bg-blue-100 text-blue-700 px-2 py-0.5 rounded-md font-medium">Auto-calcolato AIR Toscana 2026</span>
        </div>
        <input type="number" id="modal-hours" placeholder="38" min="0" max="38" readonly class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm bg-slate-50 cursor-not-allowed focus:outline-none" />
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Disponibilità Standard</label>
        <div class="overflow-x-auto">
          <table class="w-full text-sm border-collapse">
            <thead>
              <tr class="bg-slate-50">
                <th class="px-3 py-2 text-left font-semibold text-slate-600 w-28">Giorno</th>
                <th class="px-3 py-2 text-center font-semibold text-slate-600">Mattina</th>
                <th class="px-3 py-2 text-center font-semibold text-slate-600">Pomeriggio</th>
              </tr>
            </thead>
            <tbody id="avail-table"></tbody>
          </table>
        </div>
      </div>
      <div>
        <div class="flex items-center justify-between mb-2">
          <label class="block text-sm font-semibold text-slate-700">Periodi di Indisponibilità</label>
          <button id="btn-add-period" class="text-xs bg-amber-50 hover:bg-amber-100 text-amber-700 border border-amber-200 rounded-lg px-2 py-1 flex items-center gap-1">
            <i class="fa-solid fa-plus"></i> Aggiungi Periodo
          </button>
        </div>
        <div id="unavail-periods" class="space-y-2"></div>
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Colore Calendario</label>
        <div id="color-picker" class="flex flex-wrap gap-2"></div>
      </div>
    </div>
    <div class="px-6 py-4 border-t border-slate-100 flex justify-end gap-3">
      <button id="modal-cancel" class="px-4 py-2 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-100">Annulla</button>
      <button id="modal-save" class="px-4 py-2 rounded-lg text-sm font-bold bg-brand-700 hover:bg-brand-600 text-white flex items-center gap-1.5">
        <i class="fa-solid fa-floppy-disk"></i> Salva Medico
      </button>
    </div>
  </div>
</div>

<div id="gemini-loading" class="hidden fixed inset-0 bg-slate-900/60 z-[9999] flex flex-col items-center justify-center text-white">
  <i class="fa-solid fa-sparkles text-4xl mb-4 animate-spin-slow text-purple-400"></i>
  <h2 class="text-xl font-bold mb-2">Gemini sta elaborando i turni...</h2>
  <p class="text-sm text-slate-300">Risoluzione dei vincoli in corso (potrebbe richiedere 10-20 secondi)</p>
</div>

<script src="app.js"></script>
</body>
</html>
