<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>Calcolatore Ferie MMG</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        // === COSTANTI DI GRUPPO ===
        const TOTAL_ANNUAL_DAYS = 20; // 20 Giorni l'anno come richiesto
        const MAX_ABSENT_LIMIT = 2;   // Limite di medici assenti contemporaneamente

        const INITIAL_DOCTORS = [
          { id: '1', name: 'Dott.ssa Guidelli', color: 'bg-purple-300', text: 'text-purple-900' },
          { id: '2', name: 'Dott. Lacrimini', color: 'bg-yellow-200', text: 'text-yellow-900' },
          { id: '3', name: 'Dott. Sacchi', color: 'bg-red-400', text: 'text-red-900' },
          { id: '4', name: 'Dott. Nardini', color: 'bg-green-400', text: 'text-green-900' },
          { id: '5', name: 'Dott. Savianu', color: 'bg-indigo-300', text: 'text-indigo-900' },
          { id: '6', name: 'Dott. Corsi', color: 'bg-blue-400', text: 'text-blue-900' },
          { id: '7', name: 'Dott.ssa Olivieri', color: 'bg-teal-300', text: 'text-teal-900' },
        ];

        const PLANNED_HOLIDAYS = [
          { docId: '4', start: '2026-06-08', end: '2026-06-19' },
          { docId: '7', start: '2026-06-08', end: '2026-06-19' },
          { docId: '6', start: '2026-06-03', end: '2026-06-05' },
          { docId: '6', start: '2026-07-20', end: '2026-07-24' },
          { docId: '1', start: '2026-07-06', end: '2026-07-17' },
          { docId: '2', start: '2026-06-22', end: '2026-07-03' },
          { docId: '3', start: '2026-06-15', end: '2026-06-19' }, // Qui avremo 3 medici assenti contemporaneamente (4, 7 e 3)
        ];

        // === FUNZIONI DI UTILITÀ ===
        const calculateWorkingDays = (startDate, endDate) => {
            let count = 0;
            let current = new Date(startDate + 'T00:00:00');
            const end = new Date(endDate + 'T00:00:00');
            while (current <= end) {
                const dayOfWeek = current.getDay();
                if (dayOfWeek !== 0 && dayOfWeek !== 6) count++;
                current.setDate(current.getDate() + 1);
            }
            return count;
        };

        const getDoctorStats = () => {
            return INITIAL_DOCTORS.map(doc => {
                const holidays = PLANNED_HOLIDAYS.filter(h => h.docId === doc.id);
                const usedDays = holidays.reduce((total, h) => total + calculateWorkingDays(h.start, h.end), 0);
                return { ...doc, usedDays, remainingDays: TOTAL_ANNUAL_DAYS - usedDays };
            }).sort((a, b) => b.usedDays - a.usedDays);
        };

        // === COMPONENTI ===
        const CalendarMonth = ({ year, monthIndex }) => {
            const date = new Date(year, monthIndex, 1);
            const monthName = date.toLocaleString('it-IT', { month: 'long' }).toUpperCase();
            const daysInMonth = new Date(year, monthIndex + 1, 0).getDate();
            const firstDayOfWeek = date.getDay() === 0 ? 6 : date.getDay() - 1;
            const days = [...Array(firstDayOfWeek).fill(null), ...Array.from({length: daysInMonth}, (_, i) => i + 1)];

            return (
                <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-4">
                    <h3 className="font-bold text-lg mb-3 text-slate-700 text-center">{monthName} {year}</h3>
                    <div className="grid grid-cols-7 gap-1">
                        {['Lun', 'Mar', 'Mer', 'Gio', 'Ven', 'Sab', 'Dom'].map(d => (
                            <div key={d} className="text-center font-bold text-[10px] text-slate-400 py-1 uppercase">{d}</div>
                        ))}
                        {days.map((d, i) => {
                            if (!d) return <div key={i}></div>;
                            const currentDateStr = `${year}-${String(monthIndex+1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                            const isWeekend = (i % 7 === 5) || (i % 7 === 6);
                            const onHoliday = PLANNED_HOLIDAYS.filter(h => currentDateStr >= h.start && currentDateStr <= h.end);
                            const isOverLimit = onHoliday.length > MAX_ABSENT_LIMIT;

                            return (
                                <div key={i} className={`min-h-[80px] p-1 border rounded transition-all ${isWeekend ? 'bg-slate-50 border-slate-100' : isOverLimit ? 'bg-red-50 border-red-300 ring-1 ring-red-200' : 'bg-white border-slate-200'}`}>
                                    <div className="flex justify-between items-center mb-1">
                                        <span className={`text-[10px] font-bold ${isWeekend ? 'text-slate-400' : 'text-slate-700'}`}>{d}</span>
                                        {isOverLimit && !isWeekend && <span className="text-[9px] font-black text-red-600 animate-pulse">!</span>}
                                    </div>
                                    <div className="space-y-0.5">
                                        {onHoliday.map((h, idx) => {
                                            const doc = INITIAL_DOCTORS.find(doc => doc.id === h.docId);
                                            return <div key={idx} className={`text-[8px] px-1 rounded ${doc.color} ${doc.text} truncate border border-black/5`}>{doc.name.split(' ').pop()}</div>
                                        })}
                                    </div>
                                </div>
                            )
                        })}
                    </div>
                </div>
            )
        };

        function App() {
          const stats = getDoctorStats();
          return (
            <div className="min-h-screen bg-slate-50 font-sans text-slate-800 pb-20">
              <header className="bg-white border-b p-6 mb-8 shadow-sm">
                <div className="max-w-5xl mx-auto flex justify-between items-center">
                    <div>
                        <h1 className="text-2xl font-black text-slate-900 uppercase tracking-tight">Ferie Medicina di Gruppo</h1>
                        <p className="text-slate-500 text-sm">Monte ferie annuo: <b>{TOTAL_ANNUAL_DAYS} giorni</b> • Copertura min: <b>{INITIAL_DOCTORS.length - MAX_ABSENT_LIMIT} medici</b></p>
                    </div>
                    <div className="bg-blue-600 text-white px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-widest">Anno 2026</div>
                </div>
              </header>

              <main className="max-w-5xl mx-auto px-4 space-y-10">
                {/* Dashboard Riepilogo */}
                <section className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div className="p-4 bg-slate-900 text-white font-bold text-sm uppercase tracking-wider">Stato Smaltimento Ferie</div>
                    <div className="overflow-x-auto">
                        <table className="w-full text-left">
                            <thead className="bg-slate-50 text-slate-500 text-[10px] uppercase font-bold">
                                <tr>
                                    <th className="p-4">Medico</th>
                                    <th className="p-4 text-center">Consumate</th>
                                    <th className="p-4 text-center">Residue</th>
                                    <th className="p-4 w-1/3">Progresso</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                                {stats.map(s => (
                                    <tr key={s.id} className="hover:bg-slate-50/50">
                                        <td className="p-4 font-bold text-sm text-slate-700">{s.name}</td>
                                        <td className="p-4 text-center font-mono font-bold text-red-500">{s.usedDays} gg</td>
                                        <td className="p-4 text-center font-mono font-bold text-green-600">{s.remainingDays} gg</td>
                                        <td className="p-4">
                                            <div className="w-full bg-slate-100 rounded-full h-2 overflow-hidden border border-slate-200">
                                                <div className="bg-blue-500 h-full" style={{width: `${(s.usedDays/TOTAL_ANNUAL_DAYS)*100}%`}}></div>
                                            </div>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </section>

                {/* Calendari */}
                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <CalendarMonth year={2026} monthIndex={5} />
                    <CalendarMonth year={2026} monthIndex={6} />
                </div>

                <div className="bg-amber-50 border border-amber-200 p-4 rounded-xl flex items-center gap-3">
                    <div className="bg-amber-200 p-2 rounded-full">⚠️</div>
                    <p className="text-amber-800 text-xs font-medium">
                        <b>Nota per il coordinatore:</b> I giorni evidenziati in rosso nel calendario indicano una potenziale scopertura (più di {MAX_ABSENT_LIMIT} medici assenti contemporaneamente).
                    </p>
                </div>
              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
